<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Kolay Dil Ogren</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#0d9488,#2563eb);padding:20px}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.2)}
h1{margin:0 0 6px;font-size:22px;color:#134e4a}
.sub{margin:0 0 22px;font-size:13px;color:#667085;line-height:1.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#667085;margin-bottom:5px}
.field select{width:100%;padding:11px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:700;color:#172033;background:#fff}
.btn{width:100%;margin-top:8px;padding:14px;border:0;border-radius:12px;background:#0d9488;color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #0a7568}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #0a7568}
.note{margin-top:16px;font-size:11px;color:#98a2b3;text-align:center;line-height:1.5}
.ver{text-align:center;margin-top:12px;font-size:10px;color:#cbd5e1}
@media(prefers-color-scheme:dark){.card{background:#1e1e1e}h1{color:#e0f2f1}.sub{color:#aaa}.field select{background:#2a2a2a;border-color:#444;color:#e0e0e0}.field label{color:#888}}
</style>
</head>
<body>
<div class="card">
  <h1>Kolay Dil Ogren</h1>
  <p class="sub" id="intro">6 dil — tam surumler, detayli gramer.</p>
  <div class="field">
    <label id="lbl-locale">Arayuz dili</label>
    <select id="locale"><option value="tr">Turkce</option><option value="en">English</option></select>
  </div>
  <div class="field">
    <label id="lbl-target">Ogrenilecek dil</label>
    <select id="target">
      <option value="th">Tayca — ไทย</option>
      <option value="en">Ingilizce — English</option>
      <option value="de">Almanca — Deutsch</option>
      <option value="it">Italyanca — Italiano</option>
      <option value="es">Ispanyolca — Espanol</option>
      <option value="fr">Fransizca — Francais</option>
    </select>
  </div>
  <button class="btn" id="go">Basla</button>
  <p class="note" id="note">Tam dersler, detayli gramer, alistirma ve SRS.</p>
  <div class="ver">v1.3.1</div>
</div>
<script>
const APP='kdo';
const ROUTES={th:'tayca-v3.html',en:'english-v3.html',de:'german-v3.html',it:'italian-v3.html',es:'spanish-v3.html',fr:'french-v3.html'};
const LANG_KEYS={th:'tv3_lang',en:'en1_lang',de:'de1_lang',it:'it1_lang',es:'es1_lang',fr:'fr1_lang'};
const ui={
  tr:{intro:'Tayca, Ingilizce, Almanca, Italyanca, Ispanyolca ve Fransizca — tam surumler.',locale:'Arayuz dili',target:'Ogrenilecek dil',go:'Basla',note:'Tam dersler, detayli gramer, alistirma ve SRS.'},
  en:{intro:'Thai, English, German, Italian, Spanish and French — full apps.',locale:'Interface language',target:'Language to learn',go:'Start',note:'Full lessons, detailed grammar, practice and SRS.'}
};
const locale=localStorage.getItem(APP+':locale')||localStorage.getItem(APP+':ui')||'tr';
const target=localStorage.getItem(APP+':target')||'th';
const L=k=>(ui[locale]||ui.tr)[k];
function applyUi(){
  document.getElementById('intro').textContent=L('intro');
  document.getElementById('lbl-locale').textContent=L('locale');
  document.getElementById('lbl-target').textContent=L('target');
  document.getElementById('go').textContent=L('go');
  document.getElementById('note').textContent=L('note');
  document.documentElement.lang=locale;
}
document.getElementById('locale').value=locale;
document.getElementById('target').value=target;
applyUi();
document.getElementById('locale').addEventListener('change',e=>{
  localStorage.setItem(APP+':locale',e.target.value);
  localStorage.setItem(APP+':ui',e.target.value);
  localStorage.setItem(APP+':base',e.target.value);
  applyUi();
});
document.getElementById('target').addEventListener('change',e=>localStorage.setItem(APP+':target',e.target.value));
function launch(){
  const loc=document.getElementById('locale').value;
  const tgt=document.getElementById('target').value;
  localStorage.setItem(APP+':locale',loc);
  localStorage.setItem(APP+':ui',loc);
  localStorage.setItem(APP+':base',loc);
  localStorage.setItem(APP+':target',tgt);
  localStorage.setItem(LANG_KEYS[tgt]||'tv3_lang',loc);
  location.href=ROUTES[tgt]||ROUTES.th;
}
document.getElementById('go').addEventListener('click',launch);
if(new URLSearchParams(location.search).get('auto')==='1') launch();
</script>
<script src="shared/kdo-analytics-config.js"></script>
<script src="shared/kdo-analytics.js"></script>
</body>
</html>
