<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Kolay Dil Ogren</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#0d9488,#2563eb);padding:20px}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.2)}
h1{margin:0 0 2px;font-size:22px;color:#134e4a}
.sub{margin:0 0 10px;font-size:13px;color:#667085;line-height:1.5}
.dev-credit{margin:0 0 20px;font-size:11px;font-weight:600;color:#0d9488;letter-spacing:.03em;line-height:1.4}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#667085;margin-bottom:5px}
.field select{width:100%;padding:11px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:700;color:#172033;background:#fff}
.btn{width:100%;margin-top:8px;padding:14px;border:0;border-radius:12px;background:#0d9488;color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #0a7568}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #0a7568}
.note{margin-top:16px;font-size:11px;color:#98a2b3;text-align:center;line-height:1.5}
.ver{text-align:center;margin-top:12px;font-size:10px;color:#cbd5e1}
@media(prefers-color-scheme:dark){.card{background:#1e1e1e}h1{color:#e0f2f1}.sub{color:#aaa}.dev-credit{color:#5eead4}.field select{background:#2a2a2a;border-color:#444;color:#e0e0e0}.field label{color:#888}}
</style>
<script src="shared/kdo-version.js?v=3.0.44"></script>
<script src="shared/kdo-ui-i18n.js?v=3.0.41"></script>
<script src="shared/kdo-ui-extra.js?v=3.0.41"></script>
<script src="shared/kdo-ui-helpers.js?v=3.0.41"></script>
<script src="shared/kdo-platform-init.js?v=3.0.41"></script>
<script src="shared/kdo-ui-extra.js?v=3.0.41"></script>
<script src="shared/kdo-ui-helpers.js?v=3.0.41"></script>
<script src="shared/kdo-analytics-config.js?v=3.0.44"></script>
<script src="shared/kdo-geo-locale.js?v=3.0.41"></script>
</head>
<body>
<div class="card">
  <h1 id="hub-title">Kolay Dil Ogren</h1>
  <p class="sub" id="intro">11 dil — tam surumler, detayli gramer.</p>
  <p class="dev-credit" id="dev-credit"></p>
  <div class="field">
    <label id="lbl-locale">Arayuz dili</label>
    <select id="locale">
      <option value="tr">Turkce</option>
      <option value="en">English</option>
      <option value="fr">Francais</option>
      <option value="de">Deutsch</option>
      <option value="es">Espanol</option>
      <option value="it">Italiano</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
      <option value="zh">中文</option>
      <option value="th">ไทย</option>
    </select>
  </div>
  <div class="field">
    <label id="lbl-target">Ogrenilecek dil</label>
    <select id="target">
      <option value="tk">🇹🇷 Türkçe Öğrenme — Türkçe</option>
      <option value="th">🇹🇭 Tayca — ภาษาไทย</option>
      <option value="en">🇬🇧 İngilizce — English</option>
      <option value="de">🇩🇪 Almanca — Deutsch</option>
      <option value="it">🇮🇹 İtalyanca — Italiano</option>
      <option value="es">🇪🇸 İspanyolca — Español</option>
      <option value="fr">🇫🇷 Fransızca — Français</option>
      <option value="ru">🇷🇺 Rusça — Русский</option>
      <option value="ar">🇸🇦 Arapça — العربية</option>
      <option value="zh">🇨🇳 Çince — 中文</option>
      <option value="ha">🇳🇬 Hausa — Hausa</option>
    </select>
  </div>
  <button class="btn" id="go">Basla</button>
  <p class="note" id="note">Tam dersler, detayli gramer, alistirma ve SRS.</p>
  <div class="ver" id="platform-ver"></div>
</div>
<script>
const APP='kdo';
const ROUTES={tk:'learn.html?t=tk',th:'tayca-v3.html',en:'learn.html?t=en',de:'learn.html?t=de',it:'learn.html?t=it',es:'learn.html?t=es',fr:'learn.html?t=fr',ru:'learn.html?t=ru',ar:'learn.html?t=ar',zh:'learn.html?t=zh',ha:'learn.html?t=ha'};
const LANG_KEYS={tk:'tk1_lang',th:'tv3_lang',en:'en1_lang',de:'de1_lang',it:'it1_lang',es:'es1_lang',fr:'fr1_lang',ru:'ru1_lang',ar:'ar1_lang',zh:'zh1_lang',ha:'ha1_lang'};
const HUB_UI={
  tr:{title:'Kolay Dil Öğren',intro:'11 dil öğrenme + Türkçe öğretme — tam sürümler, detaylı gramer.',welcome:'Hoş geldiniz! Arayüz dilini ve öğrenmek istediğiniz dili seçin.',changeHint:'Dil tercihlerinizi buradan değiştirebilirsiniz.',locale:'Arayüz dili',target:'Öğrenilecek dil',go:'Başla',note:'Tam dersler, detaylı gramer, alıştırma ve SRS.',dev:'Geliştiren: Ali Dinçer'},
  en:{title:'Easy Language Learning',intro:'11 languages to learn + Turkish teaching — full apps with grammar.',welcome:'Welcome! Choose your interface language and the language you want to learn.',changeHint:'Change your language preferences here.',locale:'Interface language',target:'Language to learn',go:'Start',note:'Full lessons, grammar, practice and SRS.',dev:'Developed by: Ali Dinçer'},
  fr:{title:'Apprendre les langues',intro:'10 langues — lecons completes et grammaire detaillee.',welcome:'Bienvenue ! Choisissez la langue de l interface et la langue a apprendre.',changeHint:'Modifiez vos preferences de langue ici.',locale:'Langue de l interface',target:'Langue a apprendre',go:'Commencer',note:'Lecons, grammaire, exercices et SRS.',dev:'Developpe par : Ali Dinçer'},
  de:{title:'Sprachen leicht lernen',intro:'10 Sprachen — vollstandige Lektionen und Grammatik.',welcome:'Willkommen! Wahlen Sie Oberflachensprache und Lernsprache.',changeHint:'Spracheinstellungen hier andern.',locale:'Oberflachensprache',target:'Zu lernende Sprache',go:'Starten',note:'Lektionen, Grammatik, Ubung und SRS.',dev:'Entwickelt von: Ali Dinçer'},
  es:{title:'Aprender idiomas',intro:'10 idiomas — lecciones completas y gramatica detallada.',welcome:'Bienvenido! Elige el idioma de la interfaz y el idioma a aprender.',changeHint:'Cambia tus preferencias de idioma aqui.',locale:'Idioma de la interfaz',target:'Idioma a aprender',go:'Empezar',note:'Lecciones, gramatica, practica y SRS.',dev:'Desarrollado por: Ali Dinçer'},
  it:{title:'Imparare le lingue',intro:'10 lingue — lezioni complete e grammatica dettagliata.',welcome:'Benvenuto! Scegli la lingua dell interfaccia e quella da imparare.',changeHint:'Modifica le preferenze lingua qui.',locale:'Lingua interfaccia',target:'Lingua da imparare',go:'Inizia',note:'Lezioni, grammatica, pratica e SRS.',dev:'Sviluppato da: Ali Dinçer'},
  ru:{title:'Изучение языков',intro:'10 языков — полные уроки и грамматика.',welcome:'Добро пожаловать! Выберите язык интерфейса и изучаемый язык.',changeHint:'Измените настройки языка здесь.',locale:'Язык интерфейса',target:'Изучаемый язык',go:'Начать',note:'Уроки, грамматика, практика и SRS.',dev:'Разработчик: Ali Dinçer'},
  ar:{title:'تعلم اللغات',intro:'10 لغات — دروس كاملة وقواعد مفصلة.',welcome:'مرحباً! اختر لغة الواجهة واللغة التي تريد تعلمها.',changeHint:'غيّر تفضيلات اللغة من هنا.',locale:'لغة الواجهة',target:'اللغة المطلوبة',go:'ابدأ',note:'دروس وقواعد وتمرين وSRS.',dev:'المطور: علي دينشر'},
  zh:{title:'轻松学语言',intro:'10种语言——完整课程与详细语法。',welcome:'欢迎！请选择界面语言和学习语言。',changeHint:'在此更改语言偏好。',locale:'界面语言',target:'学习语言',go:'开始',note:'课程、语法、练习和SRS。',dev:'开发者：Ali Dinçer'},
  th:{title:'เรียนภาษาง่ายๆ',intro:'10 ภาษา — บทเรียนครบและไวยากรณ์ละเอียด',welcome:'ยินดีต้อนรับ! เลือกภาษาอินเทอร์เฟซและภาษาที่ต้องการเรียน',changeHint:'เปลี่ยนการตั้งค่าภาษาที่นี่',locale:'ภาษาอินเทอร์เฟซ',target:'ภาษาที่เรียน',go:'เริ่ม',note:'บทเรียน ไวยากรณ์ ฝึกหัด และ SRS',dev:'พัฒนาโดย: Ali Dinçer'}
};
const ui=HUB_UI;
const SETUP_KEY=APP+':setup-done';
let locale=localStorage.getItem(APP+':locale')||localStorage.getItem(APP+':ui')||null;
let savedTarget=localStorage.getItem(APP+':target')||null;
const L=k=>(ui[locale]||ui.en)[k];
function isSetupDone(){
  if(localStorage.getItem(SETUP_KEY)==='1') return true;
  const loc=localStorage.getItem(APP+':locale')||localStorage.getItem(APP+':ui');
  const tgt=localStorage.getItem(APP+':target');
  if(loc&&tgt){ localStorage.setItem(SETUP_KEY,'1'); return true; }
  return false;
}
function launchFromSaved(){
  const loc=localStorage.getItem(APP+':locale')||localStorage.getItem(APP+':ui')||'en';
  const tgt=localStorage.getItem(APP+':target')||'th';
  localStorage.setItem(LANG_KEYS[tgt]||'tv3_lang',loc);
  location.href=ROUTES[tgt]||ROUTES.th;
}
function applyUi(opts){
  opts=opts||{};
  const pack=ui[locale]||ui.en;
  document.getElementById('hub-title').textContent=pack.title;
  document.getElementById('intro').textContent=opts.change?pack.changeHint:(opts.welcome?pack.welcome:pack.intro);
  document.getElementById('lbl-locale').textContent=pack.locale;
  document.getElementById('lbl-target').textContent=pack.target;
  document.getElementById('go').textContent=pack.go;
  document.getElementById('note').textContent=pack.note;
  document.documentElement.lang=locale;
  document.documentElement.dir=locale==='ar'?'rtl':'ltr';
  const dc=document.getElementById('dev-credit');if(dc)dc.textContent=pack.dev;
}
async function initHub(){
  const params=new URLSearchParams(location.search);
  const forceHub=params.has('hub')||params.has('setup');
  if(isSetupDone()&&!forceHub){ launchFromSaved(); return; }
  const firstVisit=!isSetupDone();
  if(!locale){
    locale=typeof KDO_detectLocaleSync==='function'?KDO_detectLocaleSync():'en';
    if(typeof KDO_detectLocale==='function'){
      try{ locale=await KDO_detectLocale(); }catch(_){}
    }
  }
  document.getElementById('locale').value=locale;
  document.getElementById('target').value=savedTarget||'th';
  applyUi({welcome:firstVisit,change:forceHub&&!firstVisit});
}
initHub();
document.getElementById('locale').addEventListener('change',e=>{
  locale=e.target.value;
  localStorage.setItem(APP+':locale',locale);
  localStorage.setItem(APP+':ui',locale);
  localStorage.setItem(APP+':base',locale);
  const params=new URLSearchParams(location.search);
  applyUi({welcome:!isSetupDone(),change:params.has('hub')});
});
document.getElementById('target').addEventListener('change',e=>{ savedTarget=e.target.value; });
function launch(){
  const loc=document.getElementById('locale').value;
  const tgt=document.getElementById('target').value;
  localStorage.setItem(APP+':locale',loc);
  localStorage.setItem(APP+':ui',loc);
  localStorage.setItem(APP+':base',loc);
  localStorage.setItem(APP+':target',tgt);
  localStorage.setItem(SETUP_KEY,'1');
  localStorage.setItem(LANG_KEYS[tgt]||'tv3_lang',loc);
  location.href=ROUTES[tgt]||ROUTES.th;
}
document.getElementById('go').addEventListener('click',launch);
</script>
<script src="shared/kdo-analytics.js?v=3.0.44"></script>
</body>
</html>
