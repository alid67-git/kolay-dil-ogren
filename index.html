<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Kolay Dil Ogren</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#0d9488,#2563eb);padding:20px}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.2)}
h1{margin:0 0 2px;font-size:22px;color:#134e4a}
.dev-credit{margin:0 0 6px;font-size:10px;color:#94a3b8;font-weight:500}
.sub{margin:0 0 22px;font-size:13px;color:#667085;line-height:1.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#667085;margin-bottom:5px}
.field select{width:100%;padding:11px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:700;color:#172033;background:#fff}
.btn{width:100%;margin-top:8px;padding:14px;border:0;border-radius:12px;background:#0d9488;color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #0a7568}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #0a7568}
.note{margin-top:16px;font-size:11px;color:#98a2b3;text-align:center;line-height:1.5}
.ver{text-align:center;margin-top:12px;font-size:10px;color:#cbd5e1}
@media(prefers-color-scheme:dark){.card{background:#1e1e1e}h1{color:#e0f2f1}.sub{color:#aaa}.field select{background:#2a2a2a;border-color:#444;color:#e0e0e0}.field label{color:#888}}
</style>
<script src="shared/kdo-version.js"></script>
<script src="shared/kdo-ui-i18n.js"></script>
</head>
<body>
<div class="card">
  <h1>Kolay Dil Ogren</h1>
  <p class="dev-credit" id="dev-credit"></p>
  <p class="sub" id="intro">9 dil — tam surumler, detayli gramer.</p>
  <div class="field">
    <label id="lbl-locale">Arayuz dili</label>
    <select id="locale">
      <option value="tr">Turkce</option>
      <option value="en">English</option>
      <option value="fr">Francais</option>
      <option value="de">Deutsch</option>
      <option value="es">Espanol</option>
      <option value="it">Italiano</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
      <option value="zh">中文</option>
      <option value="th">ไทย</option>
    </select>
  </div>
  <div class="field">
    <label id="lbl-target">Ogrenilecek dil</label>
    <select id="target">
      <option value="tk">Turkce Ogrenme — Turkce</option>
      <option value="th">Tayca — ไทย</option>
      <option value="en">Ingilizce — English</option>
      <option value="de">Almanca — Deutsch</option>
      <option value="it">Italyanca — Italiano</option>
      <option value="es">Ispanyolca — Espanol</option>
      <option value="fr">Fransizca — Francais</option>
      <option value="ru">Rusca — Русский</option>
      <option value="ar">Arapca — العربية</option>
      <option value="zh">Cince — 中文</option>
    </select>
  </div>
  <button class="btn" id="go">Basla</button>
  <p class="note" id="note">Tam dersler, detayli gramer, alistirma ve SRS.</p>
  <div class="ver" id="platform-ver">v2.0.0</div>
</div>
<script>
const APP='kdo';
const ROUTES={tk:'turkish-v3.html',th:'tayca-v3.html',en:'english-v3.html',de:'german-v3.html',it:'italian-v3.html',es:'spanish-v3.html',fr:'french-v3.html',ru:'russian-v3.html',ar:'arabic-v3.html',zh:'chinese-v3.html'};
const LANG_KEYS={tk:'tk1_lang',th:'tv3_lang',en:'en1_lang',de:'de1_lang',it:'it1_lang',es:'es1_lang',fr:'fr1_lang',ru:'ru1_lang',ar:'ar1_lang',zh:'zh1_lang'};
const HUB_UI={
  tr:{intro:'10 dil ogrenme + Turkce ogretme — tam surumler, detayli gramer.',locale:'Arayuz dili',target:'Ogrenilecek dil',go:'Basla',note:'Tam dersler, detayli gramer, alistirma ve SRS.',dev:'Gelistiren: Ali Dinçer'},
  en:{intro:'10 languages to learn + Turkish teaching — full apps with grammar.',locale:'Interface language',target:'Language to learn',go:'Start',note:'Full lessons, grammar, practice and SRS.',dev:'Developed by: Ali Dinçer'},
  fr:{intro:'10 langues — lecons completes et grammaire detaillee.',locale:'Langue de l interface',target:'Langue a apprendre',go:'Commencer',note:'Lecons, grammaire, exercices et SRS.',dev:'Developpe par : Ali Dinçer'},
  de:{intro:'10 Sprachen — vollstandige Lektionen und Grammatik.',locale:'Oberflachensprache',target:'Zu lernende Sprache',go:'Starten',note:'Lektionen, Grammatik, Ubung und SRS.',dev:'Entwickelt von: Ali Dinçer'},
  es:{intro:'10 idiomas — lecciones completas y gramatica detallada.',locale:'Idioma de la interfaz',target:'Idioma a aprender',go:'Empezar',note:'Lecciones, gramatica, practica y SRS.',dev:'Desarrollado por: Ali Dinçer'},
  it:{intro:'10 lingue — lezioni complete e grammatica dettagliata.',locale:'Lingua interfaccia',target:'Lingua da imparare',go:'Inizia',note:'Lezioni, grammatica, pratica e SRS.',dev:'Sviluppato da: Ali Dinçer'},
  ru:{intro:'10 языков — полные уроки и грамматика.',locale:'Язык интерфейса',target:'Изучаемый язык',go:'Начать',note:'Уроки, грамматика, практика и SRS.',dev:'Разработчик: Ali Dinçer'},
  ar:{intro:'10 لغات — دروس كاملة وقواعد مفصلة.',locale:'لغة الواجهة',target:'اللغة المطلوبة',go:'ابدأ',note:'دروس وقواعد وتمرين وSRS.',dev:'المطور: علي دينشر'},
  zh:{intro:'10种语言——完整课程与详细语法。',locale:'界面语言',target:'学习语言',go:'开始',note:'课程、语法、练习和SRS。',dev:'开发者：Ali Dinçer'},
  th:{intro:'10 ภาษา — บทเรียนครบและไวยากรณ์ละเอียด',locale:'ภาษาอินเทอร์เฟซ',target:'ภาษาที่เรียน',go:'เริ่ม',note:'บทเรียน ไวยากรณ์ ฝึกหัด และ SRS',dev:'พัฒนาโดย: Ali Dinçer'}
};
const ui=HUB_UI;
const locale=localStorage.getItem(APP+':locale')||localStorage.getItem(APP+':ui')||'tr';
const target=localStorage.getItem(APP+':target')||'th';
const L=k=>(ui[locale]||ui.tr)[k];
function applyUi(){
  document.getElementById('intro').textContent=L('intro');
  document.getElementById('lbl-locale').textContent=L('locale');
  document.getElementById('lbl-target').textContent=L('target');
  document.getElementById('go').textContent=L('go');
  document.getElementById('note').textContent=L('note');
  document.documentElement.lang=locale;
  const dc=document.getElementById('dev-credit');if(dc)dc.textContent=(HUB_UI[locale]||HUB_UI.tr).dev;
}
document.getElementById('locale').value=locale;
document.getElementById('target').value=target;
applyUi();
document.getElementById('locale').addEventListener('change',e=>{
  localStorage.setItem(APP+':locale',e.target.value);
  localStorage.setItem(APP+':ui',e.target.value);
  localStorage.setItem(APP+':base',e.target.value);
  applyUi();
});
document.getElementById('target').addEventListener('change',e=>localStorage.setItem(APP+':target',e.target.value));
function launch(){
  const loc=document.getElementById('locale').value;
  const tgt=document.getElementById('target').value;
  localStorage.setItem(APP+':locale',loc);
  localStorage.setItem(APP+':ui',loc);
  localStorage.setItem(APP+':base',loc);
  localStorage.setItem(APP+':target',tgt);
  localStorage.setItem(LANG_KEYS[tgt]||'tv3_lang',loc);
  location.href=ROUTES[tgt]||ROUTES.th;
}
document.getElementById('go').addEventListener('click',launch);
if(new URLSearchParams(location.search).get('auto')==='1') launch();
</script>
<script src="shared/kdo-analytics-config.js"></script>
<script src="shared/kdo-analytics.js"></script>
</body>
</html>
